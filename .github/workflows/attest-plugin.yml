# Obsidian 插件 release：CI 重新构建 main.js 并生成 artifact attestations
# （出处证明，回应社区插件自动审查的建议），再覆盖上传到对应 release。
name: Attest plugin release

on:
  push:
    tags: ["[0-9]+.[0-9]+.[0-9]+"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to (re)build and attest, e.g. 1.0.0"
        required: true

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  attest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref_name }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      # 保险 1：tag 必须等于插件 manifest 版本，不一致直接拒绝发布
      - name: Verify tag matches manifest version
        env:
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        working-directory: clients/obsidian-plugin
        run: |
          V=$(node -p "require('./manifest.json').version")
          if [ "$V" != "$TAG" ]; then
            echo "::error::manifest version ($V) != tag ($TAG) — refusing to publish"
            exit 1
          fi
      - name: Build plugin
        working-directory: clients/obsidian-plugin
        run: |
          npm ci
          npm run build
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            clients/obsidian-plugin/main.js
            clients/obsidian-plugin/styles.css
      - name: Upload assets to release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        working-directory: clients/obsidian-plugin
        run: |
          gh release view "$TAG" >/dev/null 2>&1 || gh release create "$TAG" --title "DDL Radar $TAG" --generate-notes
          gh release upload "$TAG" main.js styles.css manifest.json --clobber
      # 保险 2：商店读的是默认分支根目录的 manifest/versions（release 成功 ≠ 商店可见），
      # 发布后自动把两份文件同步提交回 master
      - name: Sync root manifest/versions to master
        env:
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          cp clients/obsidian-plugin/manifest.json /tmp/manifest.json
          cp clients/obsidian-plugin/versions.json /tmp/versions.json
          git checkout -f master
          cp /tmp/manifest.json manifest.json
          cp /tmp/versions.json versions.json
          if git diff --quiet -- manifest.json versions.json; then
            echo "root manifest/versions already in sync"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add manifest.json versions.json
            git commit -m "chore: sync root manifest/versions to $TAG for Obsidian catalog"
            git push origin master
          fi
