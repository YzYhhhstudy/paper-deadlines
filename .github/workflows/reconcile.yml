name: Reconcile with ccfddl

on:
  schedule:
    - cron: "0 6 * * 1" # 每周一 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  reconcile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - name: Download ccfddl data
        run: |
          curl -sL https://codeload.github.com/ccfddl/ccf-deadlines/tar.gz/refs/heads/main -o /tmp/ccfddl.tgz
          mkdir -p /tmp/ccfddl
          tar xzf /tmp/ccfddl.tgz -C /tmp/ccfddl --strip-components=1

      - name: Run reconciliation with auto-fix
        run: node scripts/reconcile.js /tmp/ccfddl/conference --fix > report.md && cat report.md

      - name: Rebuild generated files after fixes
        run: |
          if ! git diff --quiet data/; then npm run build; fi

      # 单一候选日期的差异 → 自动改 YAML 并开 PR（人工审核合并）
      - name: Open auto-fix PR
        uses: peter-evans/create-pull-request@v6
        with:
          branch: bot/data-autofix
          title: "bot: 按 ccfddl 对账结果自动修正截稿日期"
          commit-message: "bot: auto-fix deadlines from ccfddl reconciliation"
          body-path: report.md
          labels: data-reconcile
          add-paths: |
            data/
            data.js
            data.json
            feeds/

      - name: Open or update issue when differences found
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if ! grep -q "⚠️" report.md; then
            echo "无差异，跳过 issue"
            exit 0
          fi
          gh label create data-reconcile --force --color FBCA04 \
            --description "与 ccfddl 的数据对账差异" -R "$GITHUB_REPOSITORY" || true
          existing=$(gh issue list -R "$GITHUB_REPOSITORY" --label data-reconcile --state open --json number --jq '.[0].number // empty')
          if [ -n "$existing" ]; then
            gh issue edit "$existing" -R "$GITHUB_REPOSITORY" --body-file report.md
          else
            gh issue create -R "$GITHUB_REPOSITORY" --title "数据对账：与 ccfddl 存在差异" \
              --label data-reconcile --body-file report.md
          fi
