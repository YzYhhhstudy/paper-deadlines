<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DDL Radar · 会议/期刊截稿日追踪</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <div class="brand">
    <h1>📡 DDL Radar</h1>
    <p id="subtitle"></p>
  </div>
  <div class="header-actions">
    <div class="seg" id="langSeg">
      <button type="button" data-lang="zh">中</button>
      <button type="button" data-lang="en">EN</button>
    </div>
    <button id="themeBtn" class="theme-btn"></button>
    <div class="msel" id="subSel">
      <button type="button" class="msel-btn" id="subBtn"></button>
      <div class="msel-panel" id="subPanel"></div>
    </div>
    <button id="exportIcs"></button>
  </div>
</header>

<main>
  <section class="filters">
    <input id="search" type="text">
    <div class="msel" id="areaSel">
      <button type="button" class="msel-btn"></button>
      <div class="msel-panel"></div>
    </div>
    <div class="msel" id="rankSel">
      <button type="button" class="msel-btn"></button>
      <div class="msel-panel"></div>
    </div>
    <select id="sortSel"></select>
    <label class="chk"><input type="checkbox" id="starredOnly"> <span id="starredLabel"></span></label>
    <label class="chk"><input type="checkbox" id="hidePast" checked> <span id="hidePastLabel"></span></label>
  </section>

  <section id="cards" class="cards"></section>

  <footer>
    <p id="contrib"></p>
    <p id="foot1"></p>
    <p id="foot2"></p>
  </footer>
</main>

<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
